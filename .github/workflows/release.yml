name: Release

env:
  TURBO_TOKEN: ${{ secrets.vercel_token }}
  TURBO_TEAM: "ruancat-projects"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 检查工具版本
        run: |
          node -v
          pnpm -v
          pnpm exec turbo --version

      - name: 计算根级发布区间
        id: release_range
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --list 'v*' --sort=-version:refname | grep -Fxv "$current_tag" | head -n 1 || true)"

          echo "current_tag=$current_tag" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: turbo 登录远程缓存
        if: ${{ env.TURBO_TOKEN != '' }}
        run: pnpm exec turbo login --token="${{ env.TURBO_TOKEN }}" --team="${{ env.TURBO_TEAM }}"

      - name: turbo 绑定远程项目
        if: ${{ env.TURBO_TOKEN != '' }}
        run: pnpm exec turbo link --token="${{ env.TURBO_TOKEN }}" --scope="${{ env.TURBO_TEAM }}" --yes

      - name: 生成 GitHub Release 日志
        shell: bash
        run: |
          current_tag="${{ steps.release_range.outputs.current_tag }}"
          previous_tag="${{ steps.release_range.outputs.previous_tag }}"

          if [ -n "$previous_tag" ]; then
            pnpm dlx changelogithub --from "$previous_tag" --to "$current_tag"
          else
            pnpm dlx changelogithub --from "$current_tag" --to "$current_tag"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
